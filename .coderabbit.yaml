# .coderabbit.yaml

reviews:
  profile: "chill"
  high_level_summary: true
  path_instructions:
    - path: "**/*"
      instructions: >
        Focus on:
        - logic errors
        - security issues
        - race conditions
        - architectural inconsistencies

        Ignore:
        - formatting
        - stylistic nitpicks
        - lint-level concerns

        Prioritize:
        - React state correctness
        - auth/security boundaries
        - async correctness
        - API contract mismatches